l_simp_chinese:
  china_communism.1.t: "共產主義者起義"
  china_communism.1.d: "共產黨人在[SCOPE.sState('jiangxi_scope').GetName]發動了起義"
  china_communism.1.f: "共產黨的激進分子在[SCOPE.sState('jiangxi_scope').GetName]揭竿而起。他們宣揚土地革命與工農政權，號召貧苦農民與失意士兵加入他們的隊伍。地方秩序迅速動盪，紅色旗幟在鄉村與山林間飄揚。對於當局而言，這既是一場叛亂，也是一種新的政治威脅——是迅速出兵圍剿，還是任其退入山林、化爲難以撲滅的遊擊火種，成爲擺在眼前的抉擇。"
  china_communism.1.a: "圍剿共匪"
  china_communism.1.b: "上山打游擊"
  from_ccp_land_revolution_ig: "土地革命"
  china_communism.2.t: "中山艦事件"
  china_communism.2.d: "[SCOPE.sState('canton_scope').GetCityHubName]發生一起政治風波，局勢緊張"
  china_communism.2.f: "部分[GetIdeology('ideology_moh_kmt').GetName]認爲[ROOT.GetCountry.GetName]有被共產主義赤化風險。爲應對可能的叛亂，高層決定對廣州實施戒嚴，並派遣忠誠部隊控制海軍艦隻，逮捕涉嫌密謀的軍官，幷包圍與外部勢力相關的黨派組織。\n\n此舉迅速控制了局勢，但也加深了黨內的分裂，暴露了政府在容共政策上的矛盾。儘管表面上事件平息，但仍暗流湧動。"
  china_communism.2.a: "暴力解決此事"
  china_communism.2.b: "繼續與他們合作"
  china_communism.2.a_tt: "此舉將會造成[GetIdeology('ideology_moh_kmt').GetName]內部分裂，共產黨人士可能會轉向暴力手段……"
  china_communism.2.b_tt: "國家將來可能有被赤化的風險……"
  je_anti_encirclement_complete_tt: "國軍贏得#variable 1#!次圍剿或共軍贏得#variable 5#!次反圍剿"
  je_anti_encirclement_status: "#blue 國軍#!勝利次數：#variable [GetGlobalVariable('moh_china_civil_war_score_kmt').GetValue]#!次；#red 共軍#!勝利次數：#variable [GetGlobalVariable('moh_china_civil_war_score_ccp').GetValue]#!次"
  je_anti_encirclement_status_countdown: "戰爭將在#variable [GetGlobalVariable('moh_china_civil_war_cooldown_months').GetValue]#!個月後開始"
  china_communism.3.t: "共軍向西逃竄"
  china_communism.3.d: "共軍被迫向西逃竄"
  china_communism.3.f: "我們的圍剿行動取得了勝利，共軍被迫向西逃竄。\n\n雖然我們成功地打擊了他們，但他們仍然是一個頑強的敵人，可能會在未來捲土重來。我們必須保持警惕，繼續加強我們的軍隊和情報網絡，以確保國家的安全和穩定。"
  china_communism.3.a: "不錯的進展"
  china_communism.4.t: "長征"
  china_communism.4.d: "我們被迫進行長征"
  china_communism.4.f: "雖然損失慘重，但也成功地保存了革命的火種。長征不僅是一次軍事行動，更是一次精神洗禮，鍛造了我們堅韌不拔的意志和團結一致的精神。我們將繼續堅持革命道路，最終實現我們的目標。"
  china_communism.4.a: "繼續堅持革命道路"
  china_communism.4.a_tt: "根據地將遷往[SCOPE.sState('shaanxi_scope').GetName]。"
